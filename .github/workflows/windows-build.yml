name: Build Windows App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Qt6 and WebEngine
      # Upgrading to v4 handles the updated Windows runner paths gracefully
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.2' # Using a known stable LTS release
        host: 'windows'
        target: 'desktop'
        arch: 'win64_mingw'
        modules: 'qtwebengine'
        # Fallback to an alternate download mirror if the primary goes down
        aqtarguments: '--retry 5 --mirror http://mirrors.ocf.berkeley.edu/qt'

    # Ensure the system explicitly knows where to look for MinGW and CMake
    - name: Configure and Compile Project
      shell: bash
      run: |
        mkdir build
        cd build
        cmake -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release ..
        cmake --build . --config Release

    - name: Run Windows Deployment Tool (windeployqt)
      shell: bash
      run: |
        # In v4, the system assigns the setup root to QT_ROOT_DIR dynamically
        "${{ env.QT_ROOT_DIR }}/bin/windeployqt.exe" --qmldir "${{ env.QT_ROOT_DIR }}/qml" build/CodePlayground.exe

    - name: Compress Build Directory to ZIP
      shell: bash
      run: |
        powershell Compress-Archive -Path build/* -DestinationPath CodePlayground-Windows-x86_64.zip

    - name: Upload Finished Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CodePlayground-Windows-Build
        path: CodePlayground-Windows-x86_64.zip
