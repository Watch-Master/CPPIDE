name: Build Windows App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Qt6 and WebEngine (Official)
      # Using the official action managed directly by the Qt Company
      uses: qt-project/install-qt-action@v1
      with:
        version: '6.6.3'
        arch: 'win64_mingw'
        # Explicitly requesting the core modules
        modules: 'qtwebengine'

    - name: Configure and Compile Project
      shell: bash
      run: |
        mkdir build
        cd build
        cmake -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release ..
        cmake --build . --config Release

    - name: Run Windows Deployment Tool (windeployqt)
      shell: bash
      run: |
        # The official action sets IQTA_QT_INSTALL_BIN dynamically
        "${{ env.IQTA_QT_INSTALL_BIN }}/windeployqt.exe" --qmldir "${{ env.QT_ROOT_DIR }}/qml" build/CodePlayground.exe

    - name: Compress Build Directory to ZIP
      shell: bash
      run: |
        powershell Compress-Archive -Path build/* -DestinationPath CodePlayground-Windows-x86_64.zip

    - name: Upload Finished Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CodePlayground-Windows-Build
        path: CodePlayground-Windows-x86_64.zip
