name: Build Windows App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Qt6 and WebEngine
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.6.3'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_mingw'
        modules: 'qtwebengine'
        # Crucial Fix: Force safe installer versions that work smoothly on Python 3.12+
        aqtversion: '==3.1.11'
        py7zrversion: '==0.20.8'

    - name: Configure and Compile Project
      shell: bash
      run: |
        mkdir build
        cd build
        cmake -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release ..
        cmake --build . --config Release

    - name: Run Windows Deployment Tool (windeployqt)
      shell: bash
      run: |
        # Pull the tool from the clean environment variable location
        "${{ env.QT_ROOT_DIR }}/bin/windeployqt.exe" --qmldir "${{ env.QT_ROOT_DIR }}/qml" build/CodePlayground.exe

    - name: Compress Build Directory to ZIP
      shell: bash
      run: |
        powershell Compress-Archive -Path build/* -DestinationPath CodePlayground-Windows-x86_64.zip

    - name: Upload Finished Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CodePlayground-Windows-Build
        path: CodePlayground-Windows-x86_64.zip
