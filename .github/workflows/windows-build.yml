name: Build Windows App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Install Qt6 and WebEngine
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.6.3'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_mingw'
        modules: 'qtwebengine'

    # Note: Removed the explicit setup-cmake action since windows-latest has it out of the box!

    - name: Configure and Compile Project
      shell: bash
      run: |
        mkdir build
        cd build
        cmake -DCMAKE_BUILD_TYPE=Release ..
        cmake --build . --config Release

    - name: Run Windows Deployment Tool (windeployqt)
      shell: bash
      run: |
        windeployqt --qmldir "${{ env.Qt6_DIR }}/qml" build/Release/CodePlayground.exe

    - name: Compress Build Directory to ZIP
      shell: bash
      run: |
        powershell Compress-Archive -Path build/Release/* -DestinationPath CodePlayground-Windows-x86_64.zip

    - name: Upload Finished Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CodePlayground-Windows-Build
        path: CodePlayground-Windows-x86_64.zip
